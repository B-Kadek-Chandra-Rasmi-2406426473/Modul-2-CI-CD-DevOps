<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h3>Search Payment Detail</h3>
    <form th:action="@{/payment/detail}" method="post">
        <div class="form-group">
            <label for="paymentIdInput">Enter Payment ID</label>
            <input type="text" name="paymentId" class="form-control mb-3 col-4" id="paymentIdInput" required placeholder="e.g. payment-123">
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/}" class="btn btn-secondary">Back to Home</a>
    </form>
</div>
</body>
</html>
