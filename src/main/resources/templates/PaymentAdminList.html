<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - All Payments</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h2>Admin Dashboard - All Payments</h2>
    <table border="1" class="table table-striped table-responsive-md mt-3">
        <thead>
        <tr>
            <th scope="col">Payment ID</th>
            <th scope="col">Order ID</th>
            <th scope="col">Method</th>
            <th scope="col">Status</th>
            <th scope="col">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.order.id}"></td>
            <td th:text="${payment.method}"></td>
            <td>
                <span th:text="${payment.status}" class="badge badge-info"></span>
            </td>
            <td>
                <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}" class="btn btn-warning btn-sm">Review Status</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Back to Home</a>
</div>
</body>
</html>
