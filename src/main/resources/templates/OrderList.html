<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Order History for <span th:text="${author}"></span></h2>

    <table border="1" class="table table-striped table-responsive-md mt-3">
        <thead>
        <tr>
            <th scope="col">Order ID</th>
            <th scope="col">Time</th>
            <th scope="col">Status</th>
            <th scope="col">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order: ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.orderTime}"></td>
            <td>
                <span th:text="${order.status}" class="badge badge-info"></span>
            </td>
            <td>
                <a th:if="${order.status == 'WAITING_PAYMENT'}"
                   th:href="@{/order/pay/{id}(id=${order.id})}"
                   class="btn btn-success btn-sm">Pay Now</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/order/history}" class="btn btn-secondary">Back to Search</a>
</div>
</body>
</html>
