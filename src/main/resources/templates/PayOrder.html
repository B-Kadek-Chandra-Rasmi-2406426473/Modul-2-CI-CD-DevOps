<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h3>Pay Order</h3>
    <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
    <p><strong>Total Items:</strong> <span th:text="${order.products.size()}"></span></p>

    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">

        <div class="form-group mt-4">
            <label for="methodInput">Select Payment Method</label>
            <select name="method" class="form-control col-4" id="methodInput" required>
                <option value="VOUCHER">Voucher Code</option>
                <option value="CASH_ON_DELIVERY">Cash On Delivery (COD)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="paymentData1">Voucher Code / Address (COD)</label>
            <input name="data1" type="text" class="form-control mb-2 col-4" id="paymentData1" placeholder="Voucher / Address">
        </div>

        <div class="form-group">
            <label for="paymentData2">Delivery Fee (For COD only)</label>
            <input name="data2" type="text" class="form-control mb-4 col-4" id="paymentData2" placeholder="e.g. 10000">
        </div>

        <button type="submit" class="btn btn-success">Submit Payment</button>
        <a th:href="@{/order/history}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
